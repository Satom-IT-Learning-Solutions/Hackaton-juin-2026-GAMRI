<!DOCTYPE html>
<html>
<head>
    <title>Site Plateforme Cloud GIT</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="hero">
        <img src="./images/Design sans titre (1).png" alt="Ciel" class="sky">
    </div>

    <div class="provisionningVM">
        <img src="./images/Logo.png" alt="Provisionning de VM" class="image">

        <h1 class="titre">Provisionning de VM</h1>

        <button class="obtenirVM" type="button">
            Obtenir une VM
        </button>

        <div class="vm-result" id="vmResult" style="display:none;">
            <p class="vm-info">IP : <span id="vmIP">-</span></p>
            <p class="vm-info">Utilisateur : <span id="vmUser">-</span></p>
            <p class="vm-info">Mot de passe : <span id="vmPassword">-</span></p>
            
            <button class="rendreVM" type="button" id="rendreVM">
                Rendre ma VM
            </button>
            <div class="vm-result" id="vmResult" style="display:none;">
            <p class=delete:"vm-info">IP : <span id="vmIP">-</span></p>
            <p class=delete:"vm-info">Utilisateur : <span id="vmUser">-</span></p>
            <p class=delete:"vm-info">Mot de passe : <span id="vmPassword">-</span></p>
        </div>
    </div>

    <footer>
        <p class="footer">@Hackaton Juin 2026</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
